<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escala Ministério de Louvor</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef3ff,#ffffff);
padding:20px;
text-align:center;
}

.grid{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
margin-top:10px;
}

.card{
width:110px;
height:120px;
background:white;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.2s;
border:3px solid transparent;
}

.card:hover{
transform:scale(1.05);
}

.card.selected{
border:3px solid #2e7dff;
background:#eef4ff;
}

.card i{
font-size:34px;
margin-bottom:8px;
}

.nome{
font-weight:bold;
}

button{
margin-top:15px;
padding:10px 25px;
border:none;
background:#2e7dff;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1f5edb;
}

.escalaBloco{

border-radius:12px;
padding:15px;
margin:15px auto;
max-width:500px;
background:white;
box-shadow:0 3px 8px rgba(0,0,0,0.15);

}

.linha{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.tag{

padding:6px 10px;
border-radius:6px;
color:white;
font-size:13px;

}

</style>
</head>

<body>

<h1>Escala Ministério de Louvor</h1>

<label>Data:</label>
<select id="data"></select>

<h2>Músicos</h2>
<div class="grid" id="musicos"></div>

<h2>Vocais</h2>
<div class="grid" id="vocais"></div>

<br>

<button onclick="adicionarEscala()">Adicionar Escala</button>
<button onclick="exportarPDF()">Exportar PDF</button>

<h2>Escalas criadas</h2>
<div id="resultados"></div>

<script>

const pessoas=[

{nome:"Wuillian",tipo:"musico",instrumento:"guitarra",cor:"#2ecc71"},
{nome:"Joao",tipo:"musico",instrumento:"guitarra",cor:"#e67e22"},
{nome:"Wladmir",tipo:"musico",instrumento:"violao",cor:"#3498db"},
{nome:"Jouci",tipo:"musico",instrumento:"guitarra",cor:"#9b59b6"},
{nome:"Anselmo",tipo:"musico",instrumento:"teclado",cor:"#16a085"},
{nome:"Nickson",tipo:"musico",instrumento:"bateria",cor:"#e74c3c"},
{nome:"Joab",tipo:"musico",instrumento:"bateria",cor:"#ff7675"},
{nome:"Tony",tipo:"musico",instrumento:"baixo",cor:"#34495e"},
{nome:"Dani",tipo:"musico",instrumento:"baixo",cor:"#2980b9"},

{nome:"Luiza",tipo:"vocal",cor:"#ff6fb5"},
{nome:"Gabriela",tipo:"vocal",cor:"#ff4fa3"},
{nome:"Vitoria",tipo:"vocal",cor:"#ff9ad5"},
{nome:"Viviane",tipo:"vocal",cor:"#ff7ac6"},
{nome:"Beatriz",tipo:"vocal",cor:"#ff2f92"},
{nome:"Karol",tipo:"vocal",cor:"#e84393"},

{nome:"Bruno",tipo:"vocal",cor:"#6c7a89"},
{nome:"Isaque",tipo:"vocal",cor:"#636e72"}

]

const icones={
guitarra:"fa-guitar",
violao:"fa-guitar",
baixo:"fa-guitar",
teclado:"fa-keyboard",
bateria:"fa-drum"
}

pessoas.forEach(p=>{

const card=document.createElement("div")

card.className="card"
card.dataset.nome=p.nome
card.dataset.tipo=p.tipo

let icon="fa-microphone"
let cor=p.cor

if(p.tipo==="musico"){
icon=icones[p.instrumento]
}

card.innerHTML=`
<i class="fa-solid ${icon}" style="color:${cor}"></i>
<div class="nome">${p.nome}</div>
`

card.onclick=()=>{
card.classList.toggle("selected")
}

if(p.tipo==="musico")
document.getElementById("musicos").appendChild(card)
else
document.getElementById("vocais").appendChild(card)

})

function adicionarEscala(){

const data=document.getElementById("data").value

const mus=[...document.querySelectorAll(".card.selected")]
.filter(c=>c.dataset.tipo==="musico")
.map(c=>c.dataset.nome)

const voc=[...document.querySelectorAll(".card.selected")]
.filter(c=>c.dataset.tipo==="vocal")
.map(c=>c.dataset.nome)

const bloco=document.createElement("div")
bloco.className="escalaBloco"

let html=`<h3>${data}</h3>`

html+=`<b>Músicos</b><div class="linha">`

mus.forEach(n=>{
const cor=pessoas.find(p=>p.nome===n).cor
html+=`<div class="tag" style="background:${cor}">${n}</div>`
})

html+=`</div><b>Vocais</b><div class="linha">`

voc.forEach(n=>{
const cor=pessoas.find(p=>p.nome===n).cor
html+=`<div class="tag" style="background:${cor}">${n}</div>`
})

html+="</div>"

bloco.innerHTML=html

bloco.dataset.data=data
bloco.dataset.musicos=mus.join(",")
bloco.dataset.vocais=voc.join(",")

document.getElementById("resultados").appendChild(bloco)

resetarSelecao()

}

function resetarSelecao(){

document.querySelectorAll(".card").forEach(c=>{
c.classList.remove("selected")
})

}

function exportarPDF(){

const {jsPDF}=window.jspdf
const pdf=new jsPDF()

const escalas=document.querySelectorAll(".escalaBloco")

let posY=20
let contador=0

escalas.forEach(e=>{

if(contador===3){
pdf.addPage()
posY=20
contador=0
}

const data=e.dataset.data
const mus=e.dataset.musicos.split(",")
const voc=e.dataset.vocais.split(",")

pdf.roundedRect(10,posY,190,80,6,6)

pdf.setFontSize(14)
pdf.text(data,15,posY+10)

pdf.text("Músicos",15,posY+20)
pdf.text("Vocais",110,posY+20)

let yMus=posY+30
let yVoc=posY+30

mus.forEach(n=>{

if(!n) return

const cor=pessoas.find(p=>p.nome===n).cor
const rgb=hexToRgb(cor)

pdf.setFillColor(rgb.r,rgb.g,rgb.b)
pdf.roundedRect(15,yMus,70,10,2,2,'F')
pdf.setTextColor(255,255,255)
pdf.text(n,18,yMus+7)

yMus+=12

})

voc.forEach(n=>{

if(!n) return

const cor=pessoas.find(p=>p.nome===n).cor
const rgb=hexToRgb(cor)

pdf.setFillColor(rgb.r,rgb.g,rgb.b)
pdf.roundedRect(110,yVoc,70,10,2,2,'F')
pdf.setTextColor(255,255,255)
pdf.text(n,113,yVoc+7)

yVoc+=12

})

posY+=90
contador++

})

pdf.save("escala_louvor.pdf")

}

function hexToRgb(hex){

const bigint=parseInt(hex.replace("#",""),16)

return{
r:(bigint>>16)&255,
g:(bigint>>8)&255,
b:bigint&255
}

}

const dias=[2,4,0]
const nomesDias=['domingo','segunda','terça','quarta','quinta','sexta','sábado']

const hoje=new Date()
const fim=new Date('2026-12-31')

const selectData=document.getElementById('data')

for(let d=new Date(hoje);d<=fim;d.setDate(d.getDate()+1)){

if(dias.includes(d.getDay())){

const dia=d.getDate().toString().padStart(2,'0')
const mes=(d.getMonth()+1).toString().padStart(2,'0')
const ano=d.getFullYear().toString().slice(-2)

const opcao=`${dia}/${mes}/${ano}-${nomesDias[d.getDay()]}`

const option=document.createElement('option')

option.value=opcao
option.textContent=opcao

selectData.appendChild(option)

}

}

</script>

</body>
</html>
