<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Escala Ministério de Louvor</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#eef3ff,#ffffff);
padding:20px;
text-align:center;
}

.grid{
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
margin-top:10px;
}

.card{

width:110px;
height:120px;
background:white;
border-radius:12px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
cursor:pointer;
transition:0.2s;
border:3px solid transparent;

}

.card:hover{
transform:scale(1.05);
}

.card.selected{
border:3px solid #2e7dff;
background:#eef4ff;
}

.card i{
font-size:34px;
margin-bottom:8px;
}

.nome{
font-weight:bold;
}

.area{
margin-top:30px;
}

button{
margin-top:15px;
padding:10px 25px;
border:none;
background:#2e7dff;
color:white;
border-radius:8px;
cursor:pointer;
}

.lista{
margin-top:10px;
}

</style>
</head>

<body>

<h1>Escala Ministério de Louvor</h1>

<label>Data:</label>
<select id="data"></select>

<h2>Músicos</h2>
<div class="grid" id="musicos"></div>

<h2>Vocais</h2>
<div class="grid" id="vocais"></div>

<div class="area">

<h3>Músicos selecionados</h3>
<div id="listaMusicos" class="lista"></div>

<h3>Vocais selecionados</h3>
<div id="listaVocais" class="lista"></div>

<button onclick="adicionarEscala()">Adicionar Escala</button>
<button onclick="exportarPDF()">Exportar PDF</button>

</div>

<div id="resultados"></div>

<script>

const pessoas=[

{nome:"Wuillian",tipo:"musico",instrumento:"guitarra",cor:"#2ecc71"},
{nome:"Joao",tipo:"musico",instrumento:"guitarra",cor:"#e67e22"},
{nome:"Wladmir",tipo:"musico",instrumento:"violao",cor:"#3498db"},
{nome:"Jouci",tipo:"musico",instrumento:"guitarra",cor:"#9b59b6"},
{nome:"Anselmo",tipo:"musico",instrumento:"teclado",cor:"#16a085"},
{nome:"Nickson",tipo:"musico",instrumento:"bateria",cor:"#e74c3c"},
{nome:"Joab",tipo:"musico",instrumento:"bateria",cor:"#ff7675"},
{nome:"Tony",tipo:"musico",instrumento:"baixo",cor:"#34495e"},
{nome:"Dani",tipo:"musico",instrumento:"baixo",cor:"#2980b9"},

{nome:"Luiza",tipo:"vocal"},
{nome:"Gabriela",tipo:"vocal"},
{nome:"Vitoria",tipo:"vocal"},
{nome:"Bruno",tipo:"vocal"},
{nome:"Isaque",tipo:"vocal"},
{nome:"Viviane",tipo:"vocal"},
{nome:"Beatriz",tipo:"vocal"},
{nome:"Karol",tipo:"vocal"}

]

const icones={

guitarra:"fa-guitar",
violao:"fa-guitar",
baixo:"fa-guitar",
teclado:"fa-keyboard",
bateria:"fa-drum"

}

const coresMicrofone=[
"#ff7675","#fd79a8","#74b9ff","#55efc4",
"#ffeaa7","#a29bfe","#fab1a0","#00cec9"
]

const coresPDF={

"Wuillian":[144,238,144],
"Joao":[255,165,0],
"Wladmir":[173,216,230],
"Jouci":[186,85,211],
"Anselmo":[60,179,113],
"Nickson":[255,99,71],
"Joab":[255,105,180],
"Tony":[139,0,0],
"Dani":[70,130,180]

}

function corMicrofone(){

return coresMicrofone[Math.floor(Math.random()*coresMicrofone.length)]

}

pessoas.forEach(p=>{

const card=document.createElement("div")

card.className="card"
card.dataset.nome=p.nome
card.dataset.tipo=p.tipo

let icon="fa-microphone"
let cor=corMicrofone()

if(p.tipo==="musico"){

icon=icones[p.instrumento]
cor=p.cor

}

card.innerHTML=`
<i class="fa-solid ${icon}" style="color:${cor}"></i>
<div class="nome">${p.nome}</div>
`

card.onclick=()=>{

card.classList.toggle("selected")
atualizarLista()

}

if(p.tipo==="musico")
document.getElementById("musicos").appendChild(card)
else
document.getElementById("vocais").appendChild(card)

})

function atualizarLista(){

const mus=[]
const voc=[]

document.querySelectorAll(".card.selected").forEach(c=>{

if(c.dataset.tipo==="musico")
mus.push(c.dataset.nome)
else
voc.push(c.dataset.nome)

})

document.getElementById("listaMusicos").innerHTML=mus.join("<br>")
document.getElementById("listaVocais").innerHTML=voc.join("<br>")

}

function adicionarEscala(){

const data=document.getElementById("data").value

const mus=[...document.querySelectorAll(".card.selected")]
.filter(c=>c.dataset.tipo==="musico")
.map(c=>c.dataset.nome)

const voc=[...document.querySelectorAll(".card.selected")]
.filter(c=>c.dataset.tipo==="vocal")
.map(c=>c.dataset.nome)

const div=document.createElement("div")

div.className="escala"
div.dataset.data=data
div.dataset.musicos=mus.join(",")
div.dataset.vocais=voc.join(",")

document.getElementById("resultados").appendChild(div)

resetarSelecao()

}

function resetarSelecao(){

document.querySelectorAll(".card").forEach(c=>{

c.classList.remove("selected")

})

document.getElementById("listaMusicos").innerHTML=""
document.getElementById("listaVocais").innerHTML=""

}

function exportarPDF(){

const {jsPDF}=window.jspdf
const pdf=new jsPDF()

const escalas=document.querySelectorAll(".escala")

let posY=20
let contador=0

escalas.forEach(e=>{

if(contador===3){

pdf.addPage()
posY=20
contador=0

}

const data=e.dataset.data
const mus=e.dataset.musicos.split(",")
const voc=e.dataset.vocais.split(",")

pdf.roundedRect(10,posY,190,80,5,5)

pdf.setFontSize(14)
pdf.text(data,15,posY+10)

pdf.setFontSize(11)
pdf.text("Músicos",15,posY+20)
pdf.text("Vocal",110,posY+20)

let yMus=posY+30
let yVoc=posY+30

mus.forEach(nome=>{

if(!nome) return

const cor=coresPDF[nome]||[200,200,200]

pdf.setFillColor(...cor)
pdf.roundedRect(15,yMus,70,10,2,2,'F')

pdf.setTextColor(0)
pdf.text(nome,18,yMus+7)

yMus+=12

})

voc.forEach(nome=>{

if(!nome) return

pdf.setFillColor(220,220,255)
pdf.roundedRect(110,yVoc,70,10,2,2,'F')

pdf.text(nome,113,yVoc+7)

yVoc+=12

})

posY+=90
contador++

})

pdf.save("escala_louvor.pdf")

}

const dias=[2,4,0]
const nomesDias=['domingo','segunda','terça','quarta','quinta','sexta','sábado']

const hoje=new Date()
const fim=new Date('2026-12-31')

const selectData=document.getElementById('data')

for(let d=new Date(hoje);d<=fim;d.setDate(d.getDate()+1)){

if(dias.includes(d.getDay())){

const dia=d.getDate().toString().padStart(2,'0')
const mes=(d.getMonth()+1).toString().padStart(2,'0')
const ano=d.getFullYear().toString().slice(-2)

const opcao=`${dia}/${mes}/${ano}-${nomesDias[d.getDay()]}`

const option=document.createElement('option')

option.value=opcao
option.textContent=opcao

selectData.appendChild(option)

}

}

</script>

</body>
</html>
