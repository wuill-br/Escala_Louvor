<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Escala Ministério de Louvor</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
text-align:center;
}

.grid{
display:flex;
flex-wrap:wrap;
gap:12px;
justify-content:center;
margin-top:15px;
}

.card{

width:130px;
height:140px;

background:white;
border-radius:12px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;

box-shadow:0 4px 10px rgba(0,0,0,0.15);

border:3px solid transparent;

}

.card.selected{
border-color:#2e7dff;
background:#eef4ff;
}

.card i{
font-size:40px;
margin-bottom:10px;
}

.nome{
font-weight:bold;
}

button{

margin-top:12px;
padding:12px 22px;

border:none;
border-radius:10px;

background:#2e7dff;
color:white;

cursor:pointer;
font-size:15px;

}

.whats{
background:#25D366;
}

select{
padding:10px;
font-size:16px;
margin-top:10px;
border-radius:8px;
}

.escalaBloco{

background:white;

max-width:520px;
margin:20px auto;

padding:15px;

border-radius:10px;

box-shadow:0 3px 8px rgba(0,0,0,0.2);

}

.linha{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
margin-top:6px;
}

.tag{
padding:6px 10px;
border-radius:6px;
color:white;
font-size:13px;
}

</style>

</head>

<body>

<h1>Escala Ministério de Louvor</h1>

<label>Data</label><br>
<select id="data"></select>

<h2>Músicos</h2>
<div class="grid" id="musicos"></div>

<h2>Vocais</h2>
<div class="grid" id="vocais"></div>

<br>

<button onclick="adicionarEscala()">Adicionar Escala</button>
<button onclick="exportarPDF()">Exportar PDF</button>

<button class="whats" onclick="compartilharWhats()">
<i class="fa-brands fa-whatsapp"></i> WhatsApp
</button>

<h2>Escalas criadas</h2>

<div id="resultados"></div>

<script>

const pessoas=[

{nome:"Wuillian",tipo:"musico",instrumento:"guitarra",cor:"#2ecc71"},
{nome:"Joao",tipo:"musico",instrumento:"guitarra",cor:"#e67e22"},
{nome:"Wladmir",tipo:"musico",instrumento:"violao",cor:"#3498db"},
{nome:"Jouci",tipo:"musico",instrumento:"guitarra",cor:"#9b59b6"},
{nome:"Anselmo",tipo:"musico",instrumento:"teclado",cor:"#16a085"},
{nome:"Nickson",tipo:"musico",instrumento:"bateria",cor:"#e74c3c"},
{nome:"Joab",tipo:"musico",instrumento:"bateria",cor:"#ff7675"},
{nome:"Tony",tipo:"musico",instrumento:"baixo",cor:"#34495e"},
{nome:"Dani",tipo:"musico",instrumento:"baixo",cor:"#2980b9"},

{nome:"Luiza",tipo:"vocal",cor:"#ff6fb5"},
{nome:"Gabriela",tipo:"vocal",cor:"#ff4fa3"},
{nome:"Vitoria",tipo:"vocal",cor:"#ff9ad5"},
{nome:"Viviane",tipo:"vocal",cor:"#ff7ac6"},
{nome:"Beatriz",tipo:"vocal",cor:"#ff2f92"},
{nome:"Karol",tipo:"vocal",cor:"#e84393"},
{nome:"Bruno",tipo:"vocal",cor:"#636e72"},
{nome:"Isaque",tipo:"vocal",cor:"#636e72"}

]

const icones={

guitarra:"fa-guitar",
violao:"fa-guitar",
baixo:"fa-guitar",
teclado:"fa-keyboard",
bateria:"fa-drum"

}

pessoas.forEach(p=>{

const card=document.createElement("div")

card.className="card"

card.dataset.nome=p.nome
card.dataset.tipo=p.tipo

let icon="fa-microphone"

if(p.tipo==="musico"){
icon=icones[p.instrumento]
}

card.innerHTML=`
<i class="fa-solid ${icon}" style="color:${p.cor}"></i>
<div class="nome">${p.nome}</div>
`

card.onclick=()=>card.classList.toggle("selected")

if(p.tipo==="musico")
document.getElementById("musicos").appendChild(card)
else
document.getElementById("vocais").appendChild(card)

})

function adicionarEscala(){

const data=document.getElementById("data").value

const mus=[...document.querySelectorAll(".card.selected")]
.filter(c=>c.dataset.tipo==="musico")
.map(c=>c.dataset.nome)

const voc=[...document.querySelectorAll(".card.selected")]
.filter(c=>c.dataset.tipo==="vocal")
.map(c=>c.dataset.nome)

const bloco=document.createElement("div")
bloco.className="escalaBloco"

let html=`<h3>${data}</h3>`

html+=`<b>Músicos</b><div class="linha">`

mus.forEach(n=>{

const cor=pessoas.find(p=>p.nome===n).cor

html+=`<div class="tag" style="background:${cor}">${n}</div>`

})

html+=`</div><b>Vocais</b><div class="linha">`

voc.forEach(n=>{

const cor=pessoas.find(p=>p.nome===n).cor

html+=`<div class="tag" style="background:${cor}">${n}</div>`

})

html+="</div>"

bloco.innerHTML=html

bloco.dataset.data=data
bloco.dataset.musicos=mus.join(",")
bloco.dataset.vocais=voc.join(",")

document.getElementById("resultados").appendChild(bloco)

document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"))

}

function gerarPDF(){

const {jsPDF}=window.jspdf
const pdf=new jsPDF()

let posY=20

document.querySelectorAll(".escalaBloco").forEach(e=>{

const data=e.dataset.data

const mus=e.dataset.musicos.split(",").filter(n=>n)
const voc=e.dataset.vocais.split(",").filter(n=>n)

const linha=12

const maior=Math.max(mus.length,voc.length)

const alturaInterna=(maior*linha)+20
const alturaTotal=alturaInterna+20

if(posY+alturaTotal>280){

pdf.addPage()
posY=20

}

pdf.setFillColor(240,240,240)
pdf.roundedRect(10,posY,190,alturaTotal,8,8,"F")

pdf.setFontSize(14)
pdf.setTextColor(0,0,0)

pdf.text(data,105,posY+10,{align:"center"})

pdf.roundedRect(15,posY+15,80,alturaInterna,4,4)
pdf.roundedRect(105,posY+15,80,alturaInterna,4,4)

pdf.text("Músicos",55,posY+22,{align:"center"})
pdf.text("Vocais",145,posY+22,{align:"center"})

let yMus=posY+32
let yVoc=posY+32

mus.forEach(n=>{

const pessoa=pessoas.find(p=>p.nome===n)

const rgb=hexToRgb(pessoa.cor)

pdf.setFillColor(rgb.r,rgb.g,rgb.b)

pdf.roundedRect(20,yMus,70,10,3,3,"F")

pdf.setFillColor(255,255,255)
pdf.circle(24,yMus+5,2,"F")

pdf.setTextColor(255,255,255)
pdf.setFontSize(11)

pdf.text(n,55,yMus+7,{align:"center"})

yMus+=linha

})

voc.forEach(n=>{

const pessoa=pessoas.find(p=>p.nome===n)

const rgb=hexToRgb(pessoa.cor)

pdf.setFillColor(rgb.r,rgb.g,rgb.b)

pdf.roundedRect(110,yVoc,70,10,3,3,"F")

pdf.setFillColor(255,255,255)
pdf.circle(114,yVoc+5,2,"F")

pdf.setTextColor(255,255,255)
pdf.setFontSize(11)

pdf.text(n,145,yVoc+7,{align:"center"})

yVoc+=linha

})

posY+=alturaTotal+10

})

return pdf

}

function exportarPDF(){

gerarPDF().save("escala_louvor.pdf")

}

async function compartilharWhats(){

const pdf=gerarPDF()

const blob=pdf.output("blob")

const file=new File([blob],"escala.pdf",{type:"application/pdf"})

if(navigator.share){

await navigator.share({

title:"Escala Louvor",
files:[file]

})

}else{

alert("Seu navegador não suporta compartilhamento direto")

}

}

function hexToRgb(hex){

const bigint=parseInt(hex.replace("#",""),16)

return{

r:(bigint>>16)&255,
g:(bigint>>8)&255,
b:bigint&255

}

}

const dias=[2,4,0]

const nomesDias=["domingo","segunda","terça","quarta","quinta","sexta","sábado"]

const select=document.getElementById("data")

const hoje=new Date()

const fim=new Date("2026-12-31")

for(let d=new Date(hoje);d<=fim;d.setDate(d.getDate()+1)){

if(dias.includes(d.getDay())){

const dia=d.getDate().toString().padStart(2,"0")
const mes=(d.getMonth()+1).toString().padStart(2,"0")
const ano=d.getFullYear().toString().slice(-2)

const texto=`${dia}/${mes}/${ano}-${nomesDias[d.getDay()]}`

const op=document.createElement("option")

op.value=texto
op.textContent=texto

select.appendChild(op)

}

}

</script>

</body>
</html>
